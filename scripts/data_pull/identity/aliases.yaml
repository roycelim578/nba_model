# Nickname / alias seed for identity resolution.
#
# WHY THIS IS A FILE, NOT AN IN-CODE DICT:
#   - editable without touching resolve_identity.py
#   - Phase 3 news/reddit ingestion reuses the SAME aliases (those sources are
#     far worse for nicknames than Polymarket), so the map must live outside any
#     one module.
#
# SHAPE: alias (lowercased nickname/handle) -> canonical full name.
#   The canonical name is then resolved through the normal normalise+match path,
#   so this file never contains a player_id (ids are allocated at runtime and
#   differ per DB). An alias is a hint about WHICH NAME a fragment means, not a
#   direct id mapping.
#
# RULES:
#   - Keys are matched after the same normalisation applied to any raw name
#     (lowercase, strip diacritics/punctuation, collapse whitespace).
#   - An alias hit means: treat the raw fragment as if it were the canonical
#     name, then resolve that name normally. Confidence/method follow from how
#     the canonical name itself resolves (so an alias to an exact-matchable name
#     resolves at 1.0 via method='exact'; the alias use is recorded in notes).
#   - ANY nickname NOT in this seed is unresolved-for-review, never guessed.
#   - Extend freely; Royce owns the contents.

